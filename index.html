<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>웹 발표자료</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="deck" aria-live="polite">
      <section class="slide is-active">
        <p class="eyebrow">Presentation</p>
        <h1>발표 제목을 입력하세요</h1>
        <p class="lead">핵심 메시지나 발표 소개 문장을 여기에 넣으면 됩니다.</p>
      </section>

      <section class="slide">
        <p class="eyebrow">Agenda</p>
        <h2>오늘의 흐름</h2>
        <ul>
          <li>첫 번째 핵심 내용</li>
          <li>두 번째 핵심 내용</li>
          <li>세 번째 핵심 내용</li>
        </ul>
      </section>

      <section class="slide">
        <p class="eyebrow">Key Point</p>
        <h2>중요한 메시지</h2>
        <p>
          이 영역에 본문 설명을 넣으세요. 문장은 짧게 나누면 발표 화면에서 더
          읽기 좋습니다.
        </p>
      </section>
    </main>

    <nav class="controls" aria-label="슬라이드 이동">
      <button type="button" id="prevSlide" aria-label="이전 슬라이드">‹</button>
      <span id="slideCount">1 / 3</span>
      <button type="button" id="nextSlide" aria-label="다음 슬라이드">›</button>
    </nav>

    <script src="script.js"></script>
  </body>
</html>
